<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Room</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h2>Add New Room</h2>

<form id="roomForm">

<input type="text" id="title" placeholder="Room Title" required><br><br>

<input type="text" id="location" placeholder="Location" required><br><br>

<input type="number" id="rent" placeholder="Monthly Rent" required><br><br>

<input type="file" id="image" required><br><br>

<textarea id="description" placeholder="Room Description"></textarea><br><br>

<button type="submit">Submit</button>

</form>

</div>


<script type="module" src="firebase.js"></script>
<script type="module" src="add-room.js"></script>
